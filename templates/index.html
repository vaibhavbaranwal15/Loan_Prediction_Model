<!DOCTYPE html>
<html>
<head>
    <title>Loan Prediction</title>

    <style>
        body{
            font-family:Arial;
            background:#f2f2f2;
        }

        .container{
            width:400px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input,select{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

        h2,p{
            text-align:center;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Loan Approval Prediction</h2>

<form action="/predict" method="POST">

<label>Age</label>
<input type="number" name ="age" required>

<label>Applicant Income</label>
<input type="number" name="income" required>

<label>Loan Amount</label>
<input type="number" name="loan_amount" required>

<label>Credit History</label>
<input type="number" name="credit_history" required>

<button type="submit">Predict</button>

</form>

<h2>{{ prediction_text }}</h2>

</div>

</body>
</html>
